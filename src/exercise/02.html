<!-- Intro to raw React APIs -->
<!-- http://localhost:3000/isolated/exercise/02.html -->

<body>
  <div id="root"></div>

  <!-- 🐨 add React and ReactDOM on the page.
       💰 Here are script tags that'll do the job:
  -->

  <script src="https://unpkg.com/react@18.1.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.1.0/umd/react-dom.development.js"></script>

  <!-- <script type="module">
    const rootElement = document.getElementById('root')
    const elementProps = {children: 'Hello World', className: 'container'}
    const reactElement = React.createElement('div', elementProps)

    ReactDOM.render(reactElement, rootElement)
  </script> -->

  <script>
    const reactESpan1 = React.createElement('span', null, 'Hello')
    const reactBr = React.createElement('br')
    const reactESpan2 = React.createElement('span', null, 'World')

    const reactEDivConProps = {className: 'container'}
    const reactEDivContainer = React.createElement(
      'div',
      reactEDivConProps,
      reactESpan1,
      reactBr,
      reactESpan2,
    )

    const rootElement2 = React.createElement(
      'div',
      {id: 'root'},
      reactEDivContainer,
    )

    ReactDOM.render(rootElement2, document.body)
  </script>
</body>
